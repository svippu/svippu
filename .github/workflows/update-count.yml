

name: Update Profile Hit Counter

on:
  push:
    branches: [main]
  schedule:
    # Runs every 6 hours — acts as a passive "heartbeat" increment
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  increment-counter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and increment count
        id: counter
        run: |
          # Read current count from JSON (default to 145 if file missing)
          if [ -f assets/count.json ]; then
            CURRENT=$(cat assets/count.json | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")
          else
            CURRENT=145
            mkdir -p assets
          fi

          # Increment by 1
          NEW=$((CURRENT + 1))
          echo "{\"count\": $NEW}" > assets/count.json
          echo "new_count=$NEW" >> $GITHUB_OUTPUT
          echo "Incremented: $CURRENT → $NEW"

      - name: Commit updated count
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/count.json
          # Only commit if there's something to commit
          git diff --staged --quiet || git commit -m "chore: bump profile hit counter to ${{ steps.counter.outputs.new_count }} [skip ci]"
          git push
